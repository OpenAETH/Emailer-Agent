services:
  - type: web
    name: asistente-ejecutivo
    env: python
    buildCommand: |
      pip install -r requirements.txt
      mkdir -p static
      # Copiar index.html si existe en la raíz
      if [ -f index.html ]; then
        cp index.html static/
        echo "index.html copiado a static/"
      else
        echo "ADVERTENCIA: index.html no encontrado en la raíz"
      fi
      # Listar archivos para debug
      ls -la
      ls -la static/ || true
    startCommand: python api.py
    envVars:
      - key: SMTP_METHOD
        value: smtp_ssl
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SENDER_NAME
        sync: false
      - key: IMAP_HOST
        sync: false
      - key: IMAP_PORT
        value: "993"
      - key: IMAP_USER
        sync: false
      - key: IMAP_PASS
        sync: false
      - key: APP_USER
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: TOKEN_TTL_HOURS
        value: "8"
